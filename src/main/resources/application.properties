# Server Configuration
server.port=9090

# Database Configuration (MongoDB)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/hindsight_hackathon}
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/hindsight_hackathon}

# JWT Configuration
jwt.secret=${JWT_SECRET:}
jwt.expiration=2592000000

# external APIs
groq.api.key=${GROQ_API_KEY:}
groq.url=https://api.groq.com/openai/v1
groq.model=llama-3.3-70b-versatile

hindsight.endpoint=https://api.hindsight.vectorize.io
hindsight.api.key=${HINDSIGHT_API_KEY:}

judge0.url=https://ce.judge0.com

# Gemini Analytics API Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.url=https://generativelanguage.googleapis.com
gemini.model=gemini-1.5-pro

# Logging configurations
logging.level.root=INFO
logging.level.com.hindsight.backend=INFO
logging.file.name=logs/combined.log

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
